<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simple Interest Calculator</title>
    <style>
body {
    background-color: #f4f4f4;
    text-align: center;
    margin-top: 50px;
}

h2 {
    color: #333;
}

input {
    width: 200px;
    padding: 10px;
    margin: 8px;
    border: 1px solid #ccc;
    border-radius: 5px;
    font-size: 16px;
}

button {
    padding: 10px 20px;
    background-color: #0078ff;
    color: white;
    border: none;
    border-radius: 5px;
    font-size: 16px;
    cursor: pointer;
}

button:hover {
    background-color: #005fd1;
}

#result {
    margin-top: 20px;
    color: green;
    font-size: 24px;
    font-weight: bold;
}
    </style>
</head>
<body style="font-family:'Lucida Sans'">

    <h2>Simple Interest Calculator</h2>

    Principal (P):
    <input type="number" id="p"><br><br>

    Rate (R):
    <input type="number" id="r"><br><br>

    Time (T):
    <input type="number" id="t"><br><br>

    <button onclick="calculateSI()">Calculate</button>

    <h3 id="result"></h3>

    <script src="script.js"></script>

</body>
</html>
